name: build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'master'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      -
        name: Validate
        uses: docker/bake-action@v6
        with:
          targets: validate

  test:
    uses: ./.github/workflows/.test.yml
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        include:
          -
            image: alpine:3.21
            base: alpine
            allow-failure: true
          -
            image: alpine:3.22
            base: alpine
            allow-failure: true
          -
            image: alpine:3.23
            base: alpine
            allow-failure: true
          -
            image: alpine:edge
            base: alpine
            allow-failure: true
          -
            image: debian:trixie
            base: debian
            allow-failure: true
          -
            image: debian:sid
            base: debian
            allow-failure: true
    with:
      image: ${{ matrix.image }}
      base: ${{ matrix.base }}
      allow-failure: ${{ matrix.allow-failure }}

  build:
    uses: docker/github-builder/.github/workflows/bake.yml@v1
    permissions:
      contents: write # same as global permission
      packages: write
      id-token: write # for signing attestation(s) with GitHub OIDC Token
    needs:
      - validate
      - test
    with:
      runner: amd64
      target: xx-all
      output: image
      push: ${{ github.event_name != 'pull_request' }}
      set-meta-labels: true
      meta-images: |
        ghcr.io/loong64/tonistiigi/xx
      meta-tags: |
        type=ref,event=branch
        type=ref,event=pr
        type=semver,pattern={{version}}
      meta-bake-target: meta-helper
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
